<section id="componentes" class="relative bg-black py-20 sm:py-28 overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[700px] rounded-full bg-[#027B8B]/10 blur-[120px]"
    ></div>
    <div
      class="absolute bottom-0 right-0 w-[300px] h-[300px] rounded-full bg-[#027B8B]/5 blur-[80px]"
    ></div>
  </div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-4xl sm:text-5xl font-bold text-white tracking-tight">
        Componentes do
        <img
          src="assets/SkinOne_Logo_BrancoTurquesa.png"
          alt="Skin One"
          class="inline-block h-[0.8em] w-auto align-[0.02em] object-contain"
        />
      </h2>
      <p class="mt-4 text-gray-400 text-lg max-w-xl mx-auto">
        Um ecossistema completo para monitoramento e prevenção de lesões de pele.
      </p>
    </div>

    <div
      class="mx-auto grid max-w-6xl grid-cols-1 items-start gap-6 lg:grid-cols-[minmax(360px,480px)_minmax(520px,576px)] lg:items-stretch lg:gap-6"
    >
      <!-- Imagem do tablet já desenhada com o app dentro (aumentada vertical e horizontalmente) -->
      <div class="relative mx-auto w-full max-w-[480px] lg:mx-0">
        <div class="absolute -inset-6 rounded-[2.5rem] bg-[#00E5FF]/35 blur-3xl"></div>
        <div class="absolute inset-7 rounded-full bg-[#00E5FF]/30 blur-3xl" aria-hidden="true"></div>
        <div class="absolute inset-0 rounded-[2rem] border border-[#7FF7FF]/35 shadow-[0_0_38px_rgba(0,229,255,0.38)]" aria-hidden="true"></div>
        <div class="relative">
          <img
            src="assets/icons/pessoa.png"
            alt="Tablet SKIN ONE"
            class="w-full h-auto rounded-[2rem]"
          />
        </div>
      </div>

      <!-- Lista de componentes -->
      <div class="mx-auto flex w-full max-w-[576px] flex-col gap-4 lg:mx-0 lg:h-full">
        @for (item of componentes; track item.id) {
          <div
            class="group relative min-h-[126px] text-left rounded-lg border border-[#00A8B5]/35 bg-[#061b20]/90 px-6 py-6 shadow-[0_18px_45px_rgba(0,0,0,0.28)] transition-all duration-300 hover:border-[#00A8B5]/70 hover:bg-[#09262c] lg:flex-1 lg:content-center"
          >
            <div class="absolute inset-y-4 left-0 w-1 rounded-r-full bg-[#00C8D7]"></div>
            <div class="flex items-start gap-4">
              <div
                class="flex h-11 w-11 flex-shrink-0 items-center justify-center rounded-lg bg-[#00A8B5]/12 ring-1 ring-[#00A8B5]/40 transition-colors duration-300 group-hover:bg-[#00A8B5]/30"
              >
                <span
                  class="material-icons text-xl text-[#79E3EA] transition-colors duration-300 group-hover:text-white"
                  >{{ item.icon }}</span
                >
              </div>
              <div class="flex-1 min-w-0">
                <h3 class="font-semibold text-base text-white">{{ item.title }}</h3>
                <p class="mt-2 text-slate-200/85 text-sm leading-relaxed">
                  {{ item.description }}
                </p>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
