<section id="componentes" class="relative bg-black py-20 sm:py-28 overflow-hidden">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[700px] rounded-full bg-[#027B8B]/10 blur-[120px]"></div>
    <div class="absolute bottom-0 right-0 w-[300px] h-[300px] rounded-full bg-[#027B8B]/5 blur-[80px]"></div>
  </div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-4xl sm:text-5xl font-bold text-white tracking-tight">
        Componentes do <span class="text-[#027B8B]">SKIN ONE</span>
      </h2>
      <p class="mt-4 text-gray-400 text-lg max-w-xl mx-auto">
        Um ecossistema completo para monitoramento e prevenção de lesões de pele.
      </p>
    </div>

    <div class="flex flex-col lg:flex-row justify-center items-start gap-6">
      <div class="relative flex-shrink-0 w-[240px] sm:w-[280px] aspect-[9/16] mx-auto lg:mx-0">
        <div class="absolute -inset-4 rounded-[2.5rem] bg-[#027B8B]/20 blur-2xl"></div>
        <div class="relative h-full w-full rounded-[2rem] overflow-hidden border-4 border-white/10 shadow-2xl shadow-black/60">
          <img
            src="assets/icons/human-body.svg"
            alt="Corpo humano para monitoramento SKIN ONE"
            class="w-full h-full object-contain p-4"
          />
        </div>
        <div class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-20 h-1.5 bg-white/20 rounded-full"></div>
      </div>

      <div class="w-full max-w-xl flex flex-col gap-4 mx-auto lg:mx-0">
        @for (item of componentes; track item.id) {
          <div class="group relative text-left rounded-xl border border-white/10 bg-white/5 p-6 transition-all duration-300 hover:border-[#027B8B]/50 hover:bg-white/8">
            <div class="flex items-start gap-4">
              <div class="flex-shrink-0 w-11 h-11 rounded-lg flex items-center justify-center bg-white/10 group-hover:bg-[#027B8B]/30 transition-colors duration-300">
                <span class="material-icons text-xl text-gray-400 group-hover:text-[#027B8B] transition-colors duration-300">{{ item.icon }}</span>
              </div>
              <div class="flex-1 min-w-0">
                <h3 class="font-semibold text-base text-white">{{ item.title }}</h3>
                <p class="mt-2 text-gray-400 text-sm leading-relaxed">{{ item.description }}</p>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
