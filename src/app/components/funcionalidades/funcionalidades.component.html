<section id="funcionalidades" class="bg-black py-20 border-t border-gray-800 sm:py-24">
  <div class="container mx-auto px-4">
    <div class="mx-auto max-w-4xl text-center">
      <p class="mb-4 text-sm font-bold uppercase tracking-[0.22em] text-cyan">Funcionalidades</p>
      <h2 class="text-3xl font-bold leading-tight text-white sm:text-4xl lg:text-5xl">
        Recursos que organizam o cuidado de ponta a ponta
      </h2>
    </div>

    <div class="mt-14 grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5">
      @for (item of funcionalidades; track item.nome) {
        <article class="group flex min-h-40 flex-col items-center justify-center rounded-md border border-white/10 bg-white/5 p-5 text-center shadow-xl transition-all duration-300 hover:-translate-y-1 hover:border-cyan/70 hover:bg-main/20">
          <div class="flex h-20 w-20 items-center justify-center rounded-md bg-cyan/15 ring-1 ring-cyan/50 transition-colors group-hover:bg-cyan/25">
            <img [src]="'assets/icons/' + item.icone" alt="" aria-hidden="true" class="h-12 w-12 object-contain [filter:brightness(0)_saturate(100%)_invert(58%)_sepia(96%)_saturate(1100%)_hue-rotate(138deg)_brightness(92%)_contrast(101%)]">
          </div>
          <h3 class="mt-5 text-base font-bold leading-snug text-white">{{ item.nome }}</h3>
        </article>
      }
    </div>
  </div>
</section>
